        series: 3, reps: "10 reps", restSeconds: 30, color: "#8b5cf6",
        isTime: false,
        muscles: { principal: ["Pectoral mayor", "Tríceps"], secundario: ["Deltoides anterior", "Core"] },
        steps: [
          { icon: "1️⃣", text: "Manos algo más anchas que los hombros, dedos apuntando al frente" },
          { icon: "2️⃣", text: "Cuerpo recto de cabeza a talones — activa el abdomen" },
          { icon: "3️⃣", text: "Baja el pecho hasta casi tocar el suelo lentamente" },
          { icon: "4️⃣", text: "Codos a unos 45° del cuerpo, no completamente abiertos" },
          { icon: "5️⃣", text: "Si es difícil, apoya las rodillas. Prioriza la técnica sobre las repeticiones" },
        ],
        tip: "La bajada debe ser controlada (2 seg). La subida puede ser más explosiva.",
      },
      {
        id: 6, name: "Glute Bridge", category: "GLÚTEOS + CORE", emoji: "🍑",
        series: 3, reps: "15 reps", restSeconds: 20, color: "#10b981",
        isTime: false,
        muscles: { principal: ["Glúteo mayor"], secundario: ["Isquiotibiales", "Core", "Suelo pélvico"] },
        steps: [
          { icon: "1️⃣", text: "Tumbado boca arriba, rodillas dobladas, pies apoyados en el suelo" },
          { icon: "2️⃣", text: "Sube la cadera empujando con los talones, no con los dedos" },
          { icon: "3️⃣", text: "Aprieta los glúteos con fuerza y mantén la posición 2 segundos arriba" },
          { icon: "4️⃣", text: "Baja lentamente sin dejar caer la cadera de golpe" },
          { icon: "5️⃣", text: "La espalda baja no debe arquearse — el movimiento viene de la cadera" },
        ],
        tip: "La pausa de 2 seg arriba es clave. Sin ella, el ejercicio pierde gran parte de su eficacia.",
      },
    ];

    function App() {
      const [screen, setScreen] = useState("home");
      const [currentIdx, setCurrentIdx] = useState(0);
      const [currentSerie, setCurrentSerie] = useState(1);
      const [restTimer, setRestTimer] = useState(0);
      const [restRunning, setRestRunning] = useState(false);
      const [exTimer, setExTimer] = useState(0);
      const [exRunning, setExRunning] = useState(false);
      const [exFinished, setExFinished] = useState(false);
      const [activeStep, setActiveStep] = useState(null);
      const [showInstructions, setShowInstructions] = useState(false);
      const [completedSeries, setCompletedSeries] = useState({});
      const restRef = useRef(null);
      const exRef = useRef(null);

      const current = exercises[currentIdx];
      const totalSeries = exercises.reduce((acc, ex) => acc + ex.series, 0);
      const completedCount = Object.values(completedSeries).reduce((a, b) => a + b, 0);
      const globalProgress = (completedCount / totalSeries) * 100;
      const circumference = 2 * Math.PI * 54;

      // Rest timer
      useEffect(() => {
        if (restRunning && restTimer > 0) {
          restRef.current = setInterval(() => {
            setRestTimer((t) => { if (t <= 1) { clearInterval(restRef.current); setRestRunning(false); return 0; } return t - 1; });
          }, 1000);
        }
        return () => clearInterval(restRef.current);
      }, [restRunning]);

      // Exercise timer
      useEffect(() => {
        if (exRunning && exTimer > 0) {
          exRef.current = setInterval(() => {
            setExTimer((t) => {
              if (t <= 1) {
                clearInterval(exRef.current);
                setExRunning(false);
                setExFinished(true);
                return 0;
              }
              return t - 1;
            });
          }, 1000);
        }
        return () => clearInterval(exRef.current);
      }, [exRunning]);

      // Reset exercise timer when exercise changes
      useEffect(() => {
        if (screen === "workout") {
          setExFinished(false);
          setExRunning(false);
          setExTimer(current.isTime ? current.timeSeconds : 0);
        }
      }, [currentIdx, currentSerie, screen]);

      const startExTimer = () => { setExTimer(current.timeSeconds); setExRunning(true); setExFinished(false); };
      const stopExTimer = () => { clearInterval(exRef.current); setExRunning(false); };
      const resetExTimer = () => { clearInterval(exRef.current); setExRunning(false); setExFinished(false); setExTimer(current.timeSeconds); };

      const startRest = () => { setRestTimer(current.restSeconds); setRestRunning(true); setScreen("rest"); };

      const handleSerieComplete = () => {
        clearInterval(exRef.current);
        setExRunning(false);
        setCompletedSeries((prev) => ({ ...prev, [current.id]: (prev[current.id] || 0) + 1 }));
        if (currentSerie < current.series) {
          setCurrentSerie((s) => s + 1); startRest();
        } else {
          if (currentIdx + 1 < exercises.length) {
            setCurrentIdx((i) => i + 1); setCurrentSerie(1);
            setShowInstructions(false); setActiveStep(null); setScreen("workout");
          } else { setScreen("summary"); }
        }
      };

      const skipRest = () => { clearInterval(restRef.current); setRestRunning(false); setScreen("workout"); };

      const resetApp = () => {
        clearInterval(restRef.current); clearInterval(exRef.current);
        setScreen("home"); setCurrentIdx(0); setCurrentSerie(1);
        setRestTimer(0); setRestRunning(false);
        setExTimer(0); setExRunning(false); setExFinished(false);
        setShowInstructions(false); setActiveStep(null); setCompletedSeries({});
      };

      const exTimerPercent = current && current.isTime ? ((current.timeSeconds - exTimer) / current.timeSeconds) * 100 : 0;
      const restTimerPercent = current ? (restTimer / current.restSeconds) * 100 : 0;

      const S = {
        page: { minHeight: "100vh", background: "#0a0a0f", color: "#fff", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", padding: "24px 16px 48px", fontFamily: "'DM Sans', sans-serif" },
        wrap: { maxWidth: 440, width: "100%" },
        bebas: { fontFamily: "'Bebas Neue', serif" },
        card: (color) => ({ background: "#111118", border: `1px solid ${color}28`, borderRadius: 24, padding: 24, marginBottom: 12, position: "relative", overflow: "hidden" }),
        btn: (color) => ({ background: `linear-gradient(135deg,${color},${color}bb)`, border: "none", borderRadius: 16, color: "#fff", fontSize: 14, fontWeight: 700, padding: "18px", cursor: "pointer", width: "100%", letterSpacing: 0.8, boxShadow: `0 8px 30px ${color}30` }),
        tag: (color, filled) => ({ background: filled ? `${color}18` : "#17171f", border: `1px solid ${filled ? color + "35" : "#27272a"}`, borderRadius: 8, padding: "4px 10px", fontSize: 12, color: filled ? color : "#52525b", fontWeight: filled ? 600 : 400 }),
      };

      return (
        <div style={S.page}>
          <style>{`
            @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
            @keyframes pulse { 0%,100% { box-shadow:0 8px 40px rgba(249,115,22,0.35); } 50% { box-shadow:0 8px 60px rgba(249,115,22,0.6); } }
            @keyframes timerPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
            @keyframes done { 0% { transform:scale(1); } 50% { transform:scale(1.15); } 100% { transform:scale(1); } }
            .fu { animation: fadeUp 0.4s ease both; }
            .pu { animation: pulse 2.5s ease infinite; }
            .sr { transition: all 0.2s ease; cursor: pointer; }
            .sr:hover { transform: translateX(5px); }
            .ec { transition: transform 0.2s ease; }
            .ec:hover { transform: translateY(-2px); }
            .tpulse { animation: timerPulse 1s ease infinite; }
            .doneanim { animation: done 0.4s ease; }
          `}</style>

          {/* HOME */}
          {screen === "home" && (
            <div className="fu" style={S.wrap}>
              <div style={{ textAlign: "center", marginBottom: 32 }}>
                <div style={{ display: "inline-block", background: "linear-gradient(135deg,#f97316,#ea580c)", borderRadius: 99, padding: "5px 16px", fontSize: 10, fontWeight: 700, letterSpacing: 3, color: "#fff", marginBottom: 14 }}>PLAN DE ENTRENAMIENTO</div>
                <h1 style={{ ...S.bebas, fontSize: 72, lineHeight: 0.9, letterSpacing: 3, background: "linear-gradient(160deg,#fff 30%,#52525b)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", marginBottom: 10 }}>CORE &<br/>FUERZA</h1>
                <p style={{ color: "#52525b", fontSize: 13, letterSpacing: 0.5 }}>6 ejercicios · 10–15 min · Sin equipamiento</p>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 24 }}>
                {[{ v: "6", l: "Ejercicios", i: "🎯" }, { v: "18", l: "Series", i: "🔥" }, { v: "3x", l: "Por semana", i: "📅" }].map(s => (
                  <div key={s.l} style={{ background: "#111118", border: "1px solid #1f1f2e", borderRadius: 16, padding: "16px 8px", textAlign: "center" }}>
                    <div style={{ fontSize: 22, marginBottom: 6 }}>{s.i}</div>
                    <div style={{ ...S.bebas, fontSize: 30, color: "#fff", lineHeight: 1 }}>{s.v}</div>
                    <div style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 1, marginTop: 3 }}>{s.l.toUpperCase()}</div>
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 28 }}>
                {exercises.map((ex, i) => (
                  <div key={ex.id} className="ec" style={{ background: "#111118", border: `1px solid ${ex.color}20`, borderLeft: `3px solid ${ex.color}`, borderRadius: 14, padding: "13px 16px", display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ width: 42, height: 42, borderRadius: 12, background: `${ex.color}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>{ex.emoji}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 3 }}>
                        <span style={{ fontWeight: 700, fontSize: 14, color: "#f4f4f5" }}>{ex.name}</span>
                        <span style={{ background: `${ex.color}18`, color: ex.color, borderRadius: 6, padding: "1px 7px", fontSize: 9, fontWeight: 700, letterSpacing: 1 }}>{ex.category}</span>
                        {ex.isTime && <span style={{ background: "#1f1f2e", color: "#71717a", borderRadius: 6, padding: "1px 7px", fontSize: 9, letterSpacing: 1 }}>⏱ TIEMPO</span>}
                      </div>
                      <div style={{ color: "#3f3f46", fontSize: 12 }}>{ex.series} series · {ex.reps}</div>
                    </div>
                    <div style={{ ...S.bebas, color: "#27272a", fontSize: 22 }}>0{i + 1}</div>
                  </div>
                ))}
              </div>
              <button className="pu" onClick={() => setScreen("workout")} style={{ background: "linear-gradient(135deg,#f97316,#ea580c)", border: "none", borderRadius: 16, color: "#fff", fontSize: 15, fontWeight: 700, padding: "18px", cursor: "pointer", width: "100%", letterSpacing: 1, boxShadow: "0 8px 40px rgba(249,115,22,0.35)" }}>
                COMENZAR ENTRENAMIENTO →
              </button>
            </div>
          )}

          {/* WORKOUT */}
          {screen === "workout" && (
            <div className="fu" style={S.wrap}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
                <button onClick={resetApp} style={{ background: "#111118", border: "1px solid #1f1f2e", borderRadius: 10, color: "#71717a", width: 36, height: 36, cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>←</button>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                    <span style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 1 }}>EJERCICIO {currentIdx + 1}/{exercises.length}</span>
                    <span style={{ fontSize: 10, color: "#3f3f46" }}>{Math.round(globalProgress)}%</span>
                  </div>
                  <div style={{ background: "#17171f", borderRadius: 99, height: 5 }}>
                    <div style={{ height: "100%", borderRadius: 99, background: `linear-gradient(90deg,${current.color},${current.color}88)`, width: `${globalProgress}%`, transition: "width 0.6s ease" }} />
                  </div>
                </div>
              </div>

              <div style={S.card(current.color)}>
                <div style={{ position: "absolute", top: -50, right: -50, width: 180, height: 180, borderRadius: "50%", background: `${current.color}08`, filter: "blur(50px)", pointerEvents: "none" }} />
                <div style={{ marginBottom: 16 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: current.color, display: "block", marginBottom: 6 }}>{current.category}</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 38 }}>{current.emoji}</span>
                    <h2 style={{ ...S.bebas, fontSize: 46, lineHeight: 1, letterSpacing: 1 }}>{current.name}</h2>
                  </div>
                </div>

                <div style={{ display: "flex", gap: 7, marginBottom: 16 }}>
                  {Array.from({ length: current.series }).map((_, i) => (
                    <div key={i} style={{ height: 5, flex: 1, borderRadius: 99, background: i < currentSerie ? current.color : "#1f1f2e", transition: "background 0.3s" }} />
                  ))}
                </div>

                <div style={{ background: `${current.color}10`, border: `1px solid ${current.color}25`, borderRadius: 14, padding: "12px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div>
                    <div style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 1 }}>SERIE ACTUAL</div>
                    <div style={{ ...S.bebas, fontSize: 38, lineHeight: 1, color: current.color }}>{currentSerie} <span style={{ color: "#27272a", fontSize: 24 }}>/ {current.series}</span></div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 1 }}>OBJETIVO</div>
                    <div style={{ ...S.bebas, fontSize: 26, lineHeight: 1.1, color: "#f4f4f5" }}>{current.reps}</div>
                  </div>
                </div>

                {/* EXERCISE TIMER — only for timed exercises */}
                {current.isTime && (
                  <div style={{ background: "#0d0d14", border: `2px solid ${current.color}40`, borderRadius: 18, padding: "18px 16px", marginBottom: 16, textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 2, marginBottom: 12 }}>TEMPORIZADOR DE EJERCICIO</div>
                    <div style={{ position: "relative", width: 130, height: 130, margin: "0 auto 14px" }}>
                      <svg width="130" height="130" style={{ position: "absolute", inset: 0, transform: "rotate(-90deg)" }}>
                        <circle cx="65" cy="65" r="54" fill="none" stroke="#1a1a25" strokeWidth="7" />
                        <circle cx="65" cy="65" r="54" fill="none" stroke={exFinished ? "#10b981" : current.color} strokeWidth="7" strokeLinecap="round"
                          strokeDasharray={circumference}
                          strokeDashoffset={circumference * (1 - exTimerPercent / 100)}
                          style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }} />
                      </svg>
                      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                        {exFinished ? (
                          <div style={{ fontSize: 36, animation: "done 0.4s ease" }}>✅</div>
                        ) : (
                          <>
                            <div className={exRunning ? "tpulse" : ""} style={{ ...S.bebas, fontSize: 48, lineHeight: 1, color: exRunning ? current.color : "#52525b" }}>
                              {exTimer === 0 && !exRunning ? current.timeSeconds : exTimer}
                            </div>
                            <div style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 2 }}>SEG</div>
                          </>
                        )}
                      </div>
                    </div>

                    {/* Timer controls */}
                    <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
                      {!exRunning && !exFinished && (
                        <button onClick={startExTimer} style={{ background: `linear-gradient(135deg,${current.color},${current.color}bb)`, border: "none", borderRadius: 12, color: "#fff", fontSize: 14, fontWeight: 700, padding: "10px 24px", cursor: "pointer" }}>
                          ▶ INICIAR
                        </button>
                      )}
                      {exRunning && (
                        <button onClick={stopExTimer} style={{ background: "#17171f", border: `1px solid ${current.color}40`, borderRadius: 12, color: current.color, fontSize: 14, fontWeight: 700, padding: "10px 24px", cursor: "pointer" }}>
                          ⏸ PAUSAR
                        </button>
                      )}
                      {(exTimer < current.timeSeconds && !exRunning) && (
                        <button onClick={resetExTimer} style={{ background: "#17171f", border: "1px solid #27272a", borderRadius: 12, color: "#71717a", fontSize: 14, fontWeight: 700, padding: "10px 16px", cursor: "pointer" }}>
                          ↺
                        </button>
                      )}
                    </div>
                    {exFinished && (
                      <div style={{ marginTop: 10, fontSize: 13, color: "#10b981", fontWeight: 600 }}>¡Serie completada! Pulsa el botón de abajo →</div>
                    )}
                  </div>
                )}

                {/* Muscles */}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 2, marginBottom: 8 }}>MÚSCULOS</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {current.muscles.principal.map(m => <span key={m} style={S.tag(current.color, true)}>{m}</span>)}
                    {current.muscles.secundario.map(m => <span key={m} style={S.tag(current.color, false)}>{m}</span>)}
                  </div>
                </div>

                {/* Instructions */}
                <button onClick={() => { setShowInstructions(!showInstructions); setActiveStep(null); }} style={{ background: showInstructions ? `${current.color}12` : "#17171f", border: `1px solid ${showInstructions ? current.color + "35" : "#27272a"}`, borderRadius: 12, color: showInstructions ? current.color : "#71717a", fontSize: 13, fontWeight: 600, padding: "10px 16px", cursor: "pointer", width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span>📋 Cómo se hace — paso a paso</span>
                  <span style={{ fontSize: 11, opacity: 0.7 }}>{showInstructions ? "▲ ocultar" : "▼ ver"}</span>
                </button>

                {showInstructions && (
                  <div style={{ marginTop: 12 }}>
                    <div style={{ display: "flex", flexDirection: "column", gap: 7, marginBottom: 10 }}>
                      {current.steps.map((step, i) => (
                        <div key={i} className="sr" onClick={() => setActiveStep(activeStep === i ? null : i)}
                          style={{ background: activeStep === i ? `${current.color}12` : "#17171f", border: `1px solid ${activeStep === i ? current.color + "30" : "#222230"}`, borderRadius: 12, padding: "10px 14px", display: "flex", gap: 10, alignItems: "flex-start" }}>
                          <span style={{ fontSize: 15, flexShrink: 0 }}>{step.icon}</span>
                          <span style={{ fontSize: 13, lineHeight: 1.55, color: activeStep === i ? "#f4f4f5" : "#71717a", fontWeight: activeStep === i ? 500 : 400 }}>{step.text}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{ background: "#17171f", border: "1px solid #222230", borderRadius: 12, padding: "10px 14px", display: "flex", gap: 10 }}>
                      <span style={{ fontSize: 15 }}>💡</span>
                      <span style={{ fontSize: 12, color: "#52525b", lineHeight: 1.55 }}><strong style={{ color: "#71717a" }}>Consejo:</strong> {current.tip}</span>
                    </div>
                  </div>
                )}
              </div>

              <button onClick={handleSerieComplete} style={S.btn(current.color)}>
                {currentSerie < current.series ? `✅ SERIE ${currentSerie} COMPLETADA → DESCANSO` : currentIdx + 1 < exercises.length ? "✅ EJERCICIO COMPLETO → SIGUIENTE" : "🏆 ¡ÚLTIMO EJERCICIO COMPLETADO!"}
              </button>
            </div>
          )}

          {/* REST */}
          {screen === "rest" && (
            <div className="fu" style={{ ...S.wrap, textAlign: "center" }}>
              <div style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 3, marginBottom: 28 }}>TIEMPO DE RECUPERACIÓN</div>
              <div style={{ position: "relative", width: 160, height: 160, margin: "0 auto 32px" }}>
                <svg width="160" height="160" style={{ position: "absolute", inset: 0, transform: "rotate(-90deg)" }}>
                  <circle cx="80" cy="80" r="54" fill="none" stroke="#1a1a25" strokeWidth="8" />
                  <circle cx="80" cy="80" r="54" fill="none" stroke={current.color} strokeWidth="8" strokeLinecap="round"
                    strokeDasharray={circumference} strokeDashoffset={circumference * (1 - restTimerPercent / 100)}
                    style={{ transition: "stroke-dashoffset 1s linear" }} />
                </svg>
                <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ ...S.bebas, fontSize: 56, lineHeight: 1, color: current.color }}>{restTimer}</div>
                  <div style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 2 }}>SEG</div>
                </div>
              </div>
              <div style={{ background: "#111118", border: `1px solid ${current.color}22`, borderRadius: 16, padding: "16px 20px", marginBottom: 24, textAlign: "left" }}>
                <div style={{ fontSize: 10, color: "#3f3f46", letterSpacing: 2, marginBottom: 8 }}>SIGUIENTE</div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 26 }}>{current.emoji}</span>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15, color: "#f4f4f5" }}>{current.name} — Serie {currentSerie}</div>
                    <div style={{ fontSize: 12, color: "#3f3f46", marginTop: 2 }}>{current.reps}</div>
                  </div>
                </div>
              </div>
              <button onClick={skipRest} style={{ background: "#17171f", border: "1px solid #27272a", borderRadius: 14, color: "#71717a", fontSize: 14, fontWeight: 600, padding: "14px 40px", cursor: "pointer" }}>
                Saltar descanso →
              </button>
            </div>
          )}

          {/* SUMMARY */}
          {screen === "summary" && (
            <div className="fu" style={{ ...S.wrap, textAlign: "center" }}>
              <div style={{ fontSize: 60, marginBottom: 14 }}>🏆</div>
              <h2 style={{ ...S.bebas, fontSize: 60, lineHeight: 1, letterSpacing: 2, background: "linear-gradient(135deg,#fbbf24,#f97316)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", marginBottom: 6 }}>¡COMPLETADO!</h2>
              <p style={{ color: "#52525b", fontSize: 13, marginBottom: 28 }}>Has trabajado todos los grupos musculares</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 24 }}>
                {exercises.map(ex => (
                  <div key={ex.id} style={{ background: "#111118", border: `1px solid ${ex.color}20`, borderLeft: `3px solid ${ex.color}`, borderRadius: 14, padding: "12px 16px", display: "flex", alignItems: "center", gap: 12, textAlign: "left" }}>
                    <span style={{ fontSize: 18 }}>✅</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: "#f4f4f5" }}>{ex.name}</div>
                      <div style={{ fontSize: 12, color: "#3f3f46" }}>{ex.series} series · {ex.reps}</div>
                    </div>
                    <span style={{ background: `${ex.color}15`, color: ex.color, borderRadius: 8, padding: "2px 8px", fontSize: 9, fontWeight: 700, letterSpacing: 1 }}>{ex.category}</span>
                  </div>
                ))}
              </div>
              <div style={{ background: "#111118", border: "1px solid #1f1f2e", borderRadius: 16, padding: 18, marginBottom: 24, textAlign: "left" }}>
                <div style={{ fontSize: 10, color: "#f97316", letterSpacing: 2, marginBottom: 12 }}>💡 RECUERDA</div>
                {["Descansa al menos 1 día entre sesiones", "Hidratación antes, durante y después", "Progresa gradualmente: más reps o más tiempo", "El sueño es tan importante como el ejercicio"].map(tip => (
                  <div key={tip} style={{ fontSize: 13, color: "#52525b", lineHeight: 1.6, borderBottom: "1px solid #17171f", padding: "6px 0" }}>· {tip}</div>
                ))}
              </div>
              <button onClick={resetApp} style={{ background: "linear-gradient(135deg,#f97316,#ea580c)", border: "none", borderRadius: 16, color: "#fff", fontSize: 15, fontWeight: 700, padding: "18px", cursor: "pointer", width: "100%", boxShadow: "0 8px 40px rgba(249,115,22,0.3)", letterSpacing: 0.8 }}>
                VOLVER AL INICIO 🏠
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
    }
  </script>
</body>
</html>
