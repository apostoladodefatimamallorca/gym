    '<text x="70" y="88" text-anchor="middle" font-family="'Bebas Neue',serif" font-size="'+(size===160?56:48)+'" fill="'+(val<total&&val>0?color:'#52525b')+'">'+val+'</text>'+
    '<text x="70" y="106" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#3f3f46" letter-spacing="2">SEG</text>';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 140 140" style="display:block;margin:0 auto;transform:rotate(-90deg) translate(-'+(size-140)/2+'px,-'+(size-140)/2+'px)">'
    +'<circle cx="70" cy="70" r="54" fill="none" stroke="#1a1a25" stroke-width="8"/>'
    +'<circle cx="70" cy="70" r="54" fill="none" stroke="'+(done?'#10b981':color)+'" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+CIRC+'" stroke-dashoffset="'+off+'" style="transition:stroke-dashoffset 1s linear"/>'
    +'</svg>'
    +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'+inner+'</div>';
}

function render(){

      +ex.muscles.p.map(function(m){return '<span style="'+dm+'background:'+ex.color+'18;border:1px solid '+ex.color+'35;border-radius:8px;padding:4px 10px;font-size:12px;color:'+ex.color+';font-weight:600">'+m+'</span>';}).join('')
      +ex.muscles.s.map(function(m){return '<span style="'+dm+'background:#17171f;border:1px solid #27272a;border-radius:8px;padding:4px 10px;font-size:12px;color:#52525b">'+m+'</span>';}).join('')

    var stepsBtn=B("📋 Cómo se hace — paso a paso "+(s.showSteps?"▲":"▼"),"background:"+(s.showSteps?ex.color+"12":"#17171f")+";border:1px solid "+(s.showSteps?ex.color+"35":"#27272a")+";border-radius:12px;color:"+(s.showSteps?ex.color:"#71717a")+";font-size:13px;font-weight:600;padding:10px 16px;cursor:pointer;width:100%;text-align:left","","","toggleSteps()");
    var stepsHTML="";
    if(s.showSteps){
      stepsHTML='<div style="margin-top:12px">'
        +ex.steps.map(function(st,i){
          var active=s.activeStep===i;
          return '<div onclick="toggleStep('+i+')" style="'+dm+'background:'+(active?ex.color+"12":"#17171f")+';border:1px solid '+(active?ex.color+"30":"#222230")+';border-radius:12px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;margin-bottom:6px;cursor:pointer">'
            +'<span style="font-size:15px;flex-shrink:0">'+(i+1)+'️⃣</span>'
            +'<span style="font-size:13px;line-height:1.55;color:'+(active?"#f4f4f5":"#71717a")+';font-weight:'+(active?500:400)+'">'+st+'</span></div>';
        }).join('')
        +'<div style="background:#17171f;border:1px solid #222230;border-radius:12px;padding:10px 14px;display:flex;gap:10px"><span>💡</span><span style="'+dm+'font-size:12px;color:#52525b;line-height:1.55"><strong style="color:#71717a">Consejo:</strong> '+ex.tip+'</span></div></div>';
    }
    var manualBtn=!ex.isTime?B(
      s.serie<ex.series?"✅ SERIE "+s.serie+" COMPLETADA → DESCANSO":s.exI+1<EX.length?"✅ EJERCICIO COMPLETO → SIGUIENTE":"🏆 ¡ÚLTIMO EJERCICIO COMPLETADO!",
      "background:linear-gradient(135deg,"+ex.color+","+ex.color+"bb);border:none;border-radius:16px;color:#fff;font-size:14px;font-weight:700;padding:18px;cursor:pointer;width:100%;letter-spacing:.8px",
      "","","completeSerie()"):"";
    var prog=Math.round((s.doneSeries/TOTAL_SERIES)*100);
    r('<div class="fu" style="max-width:440px;width:100%;margin:0 auto;padding:24px 16px 48px">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">'
      +'<button onclick="doReset()" style="background:#111118;border:1px solid #1f1f2e;border-radius:10px;color:#71717a;width:36px;height:36px;cursor:pointer;font-size:18px;flex-shrink:0">←</button>'
      +'<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="'+dm+'font-size:10px;color:#3f3f46;letter-spacing:1px">EJERCICIO '+(s.exI+1)+'/'+EX.length+'</span><span style="'+dm+'font-size:10px;color:#3f3f46">'+prog+'%</span></div>'
      +'<div style="background:#17171f;border-radius:99px;height:5px"><div style="height:100%;border-radius:99px;background:linear-gradient(90deg,'+ex.color+','+ex.color+'88);width:'+prog+'%;transition:width .6s ease"></div></div></div></div>'
      +'<div style="background:#111118;border:1px solid '+ex.color+'28;border-radius:24px;padding:24px;margin-bottom:12px;position:relative;overflow:hidden">'
      +'<div style="position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:'+ex.color+'08;filter:blur(50px);pointer-events:none"></div>'
      +'<div style="margin-bottom:16px"><span style="'+dm+'font-size:10px;font-weight:700;letter-spacing:2px;color:'+ex.color+';display:block;margin-bottom:6px">'+ex.cat+'</span>'
      +'<div style="display:flex;align-items:center;gap:12px"><span style="font-size:38px">'+ex.emoji+'</span><h2 style="'+bb+'font-size:42px;line-height:1;letter-spacing:1px;color:#fff">'+ex.name+'</h2></div></div>'
      +'<div style="display:flex;gap:7px;margin-bottom:16px">'
      +Array.from({length:ex.series}).map(function(_,i){return '<div style="height:5px;flex:1;border-radius:99px;background:'+(i<s.serie?ex.color:"#1f1f2e")+';transition:background .3s"></div>';}).join('')+'</div>'
      +'<div style="background:'+ex.color+'10;border:1px solid '+ex.color+'25;border-radius:14px;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
      +'<div><div style="'+dm+'font-size:10px;color:#3f3f46;letter-spacing:1px">SERIE ACTUAL</div><div style="'+bb+'font-size:38px;line-height:1;color:'+ex.color+'">'+s.serie+' <span style="color:#27272a;font-size:24px">/ '+ex.series+'</span></div></div>'
      +'<div style="text-align:right"><div style="'+dm+'font-size:10px;color:#3f3f46;letter-spacing:1px">OBJETIVO</div><div style="'+bb+'font-size:22px;line-height:1.1;color:#f4f4f5">'+ex.reps+'</div></div></div>'
      +timerHTML+muscHTML+stepsBtn+stepsHTML+'</div>'+manualBtn+'</div>');
  }

  else if(s.screen==="rest"){
    var rp=ex.rest>0?(s.restT/ex.rest)*100:0;
    var nextSerie=s.serie; // after rest, same serie number was already incremented
    r('<div class="fu" style="max-width:440px;width:100%;margin:0 auto;padding:24px 16px 48px;text-align:center">'
      +'<div style="'+dm+'font-size:10px;color:#3f3f46;letter-spacing:3px;margin-bottom:28px">TIEMPO DE RECUPERACIÓN</div>'
      +'<div style="position:relative;width:160px;height:160px;margin:0 auto 32px">'
      +circSVG(s.restT,ex.rest,ex.color,s.restT===0,160)+'</div>'
      +'<div style="background:#111118;border:1px solid '+ex.color+'22;border-radius:16px;padding:16px 20px;margin-bottom:24px;text-align:left">'
      +'<div style="'+dm+'font-size:10px;color:#3f3f46;letter-spacing:2px;margin-bottom:8px">SIGUIENTE</div>'
      +'<div style="display:flex;align-items:center;gap:12px"><span style="font-size:26px">'+ex.emoji+'</span>'
      +'<div><div style="'+dm+'font-weight:700;font-size:15px;color:#f4f4f5">'+ex.name+' — Serie '+nextSerie+'</div>'
      +'<div style="'+dm+'font-size:12px;color:#3f3f46;margin-top:2px">'+ex.reps+'</div></div></div></div>'
      +B("Saltar descanso →","background:#17171f;border:1px solid #27272a;border-radius:14px;color:#71717a;font-size:14px;font-weight:600;padding:14px 40px;cursor:pointer","","","skipRest()")
      +'</div>');
  }

  else if(s.screen==="summary"){
    r('<div class="fu" style="max-width:440px;width:100%;margin:0 auto;padding:24px 16px 48px;text-align:center">'
      +'<div style="font-size:60px;margin-bottom:14px">🏆</div>'
      +'<h2 style="'+bb+'font-size:60px;line-height:1;letter-spacing:2px;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px">¡COMPLETADO!</h2>'
      +'<p style="'+dm+'color:#52525b;font-size:13px;margin-bottom:28px">Has trabajado todos los grupos musculares</p>'
      +EX.map(function(e){return '<div style="background:#111118;border:1px solid '+e.color+'20;border-left:3px solid '+e.color+';border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;text-align:left;margin-bottom:8px">'
        +'<span style="font-size:18px">✅</span><div style="flex:1"><div style="'+dm+'font-weight:700;font-size:14px;color:#f4f4f5">'+e.name+'</div>'
        +'<div style="'+dm+'font-size:12px;color:#3f3f46">'+e.series+' series · '+e.reps+'</div></div>'
        +'<span style="'+dm+'background:'+e.color+'15;color:'+e.color+';border-radius:8px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:1px">'+e.cat+'</span></div>';}).join('')
      +'<div style="background:#111118;border:1px solid #1f1f2e;border-radius:16px;padding:18px;margin-bottom:24px;text-align:left">'

      +'</div>');
  }
}

// ── Actions ──
function goWorkout(){state.screen="workout";render();}

function startEx(){
  var ex=getEx();
  unlockBell(); // unlock audio on this tap
  state.exT=ex.secs; state.exDone=false; state.exOn=true;
  render();
  clearInterval(exInterval);
  exInterval=setInterval(function(){
    if(state.exT>1){state.exT--;render();}
    else{
      clearInterval(exInterval);
      state.exT=0; state.exOn=false; state.exDone=true;
      playBell();
      render();
      autoTimeout=setTimeout(function(){
        var ex2=getEx();
        state.exDone=false;
        if(ex2.sides && state.side===0){
          // switch to right side
          state.side=1;
          state.exT=ex2.secs;
          render();
          // auto-start right side
          autoTimeout=setTimeout(function(){
            state.exOn=true; render();
            clearInterval(exInterval);
            exInterval=setInterval(function(){
              if(state.exT>1){state.exT--;render();}
              else{
                clearInterval(exInterval);
                state.exT=0; state.exOn=false; state.exDone=true;
                playBell(); render();
                autoTimeout=setTimeout(function(){
                  state.exDone=false; state.side=0;
                  state.doneSeries++;
                  goRest();
                },1000);
              }
            },1000);
          },800);
        } else {
          state.side=0;
          state.doneSeries++;
          goRest();
        }
      },1000);
    }
  },1000);
}

function pauseEx(){clearInterval(exInterval);state.exOn=false;render();}
function continueEx(){
  unlockBell();
  state.exOn=true; render();
  clearInterval(exInterval);
  exInterval=setInterval(function(){
    if(state.exT>1){state.exT--;render();}
    else{clearInterval(exInterval);state.exT=0;state.exOn=false;state.exDone=true;playBell();render();
      autoTimeout=setTimeout(function(){state.exDone=false;state.side=0;state.doneSeries++;goRest();},1000);}
  },1000);
}
function resetEx(){clearInterval(exInterval);clearTimeout(autoTimeout);state.exOn=false;state.exDone=false;state.exT=getEx().secs;state.side=0;render();}

function goRest(){
  var ex=getEx();
  state.restT=ex.rest; state.restOn=true; state.screen="rest"; render();
  clearInterval(restInterval);
  restInterval=setInterval(function(){
    if(state.restT>1){state.restT--;render();}
    else{
      clearInterval(restInterval);
      state.restT=0; state.restOn=false;
      playBell(); render();
      autoTimeout=setTimeout(function(){goNextAfterRest();},1000);
    }
  },1000);
}

function goNextAfterRest(){
  var ex=getEx();
  if(state.serie<ex.series){
    state.serie++;
    state.side=0;
    state.screen="workout";
    state.showSteps=false; state.activeStep=-1;
    render();
  } else if(state.exI+1<EX.length){
    state.exI++;
    state.serie=1; state.side=0;
    state.screen="workout";
    state.showSteps=false; state.activeStep=-1;
    render();
  } else {
    state.screen="summary"; render();
  }
}

function skipRest(){
  clearInterval(restInterval); clearTimeout(autoTimeout);
  state.restOn=false; state.restT=0;
  goNextAfterRest();
}

function completeSerie(){
  var ex=getEx();
  state.doneSeries++;
  if(state.serie<ex.series){
    state.serie++;
    state.restT=ex.rest; state.restOn=true; state.screen="rest"; render();
    clearInterval(restInterval);
    restInterval=setInterval(function(){
      if(state.restT>1){state.restT--;render();}
      else{clearInterval(restInterval);state.restT=0;state.restOn=false;playBell();render();
        autoTimeout=setTimeout(function(){goNextAfterRest();},1000);}
    },1000);
  } else if(state.exI+1<EX.length){
    state.exI++; state.serie=1; state.side=0;
    state.screen="workout"; state.showSteps=false; state.activeStep=-1; render();
  } else {
    state.screen="summary"; render();
  }
}

function toggleSteps(){state.showSteps=!state.showSteps;state.activeStep=-1;render();}
function toggleStep(i){state.activeStep=state.activeStep===i?-1:i;render();}
function doReset(){
  clearInterval(restInterval);clearInterval(exInterval);clearTimeout(autoTimeout);
  state={screen:"home",exI:0,serie:1,side:0,restT:0,restOn:false,exT:0,exOn:false,exDone:false,showSteps:false,activeStep:-1,doneSeries:0};
  render();
}

// ── Init ──
render();
</script>
