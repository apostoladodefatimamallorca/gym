<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Core & Fuerza" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Core & Fuerza</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0f; }
    #root { min-height: 100%; }
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Audio context unlocked on first user tap ──
    let audioCtx = null;

    function unlockAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playBell() {
      try {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const t = audioCtx.currentTime;
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc1.connect(gain); osc2.connect(gain);
        gain.connect(audioCtx.destination);
        osc1.frequency.setValueAtTime(1046, t);
        osc1.frequency.exponentialRampToValueAtTime(523, t + 1.0);
        osc2.frequency.setValueAtTime(1318, t);
        osc2.frequency.exponentialRampToValueAtTime(659, t + 1.0);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.4, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
        osc1.start(t); osc1.stop(t + 1.5);
        osc2.start(t); osc2.stop(t + 1.5);
      } catch(e) { console.log('bell error', e); }
    }

    // Plancha Lateral split into left+right phases
    const exercises = [
      {
        id:1, name:"Plancha Frontal", category:"CORE", emoji:"💪",
        series:3, reps:"30 seg", restSeconds:20, color:"#f97316",
        isTime:true, timeSeconds:30, phases:null,
        muscles:{principal:["Core completo","Transverso abdominal"],secundario:["Hombros","Glúteos"]},
        steps:[
          {icon:"1️⃣",text:"Apóyate en los antebrazos y en las puntas de los pies"},
          {icon:"2️⃣",text:"Cuerpo completamente recto de cabeza a talones"},
          {icon:"3️⃣",text:"Abdomen fuertemente contraído — imagina que te van a dar un golpe"},
          {icon:"4️⃣",text:"Sin hundir ni elevar las caderas en ningún momento"},
          {icon:"5️⃣",text:"Cuello neutro, mirada al suelo, respira con normalidad"},
        ],
        tip:"Si sientes que la cadera cae, reduce el tiempo y hazlo bien.",
      },
      {
        id:2, name:"Dead Bug", category:"CORE", emoji:"🪲",
        series:3, reps:"10 cada lado", restSeconds:20, color:"#f97316",
        isTime:false, phases:null,
        muscles:{principal:["Transverso abdominal","Multífidos"],secundario:["Recto abdominal","Psoas"]},
        steps:[
          {icon:"1️⃣",text:"Tumbado boca arriba, brazos extendidos hacia el techo"},
          {icon:"2️⃣",text:"Caderas y rodillas a 90°, piernas en el aire"},
          {icon:"3️⃣",text:"Zona lumbar PEGADA al suelo — lo más importante"},
          {icon:"4️⃣",text:"Exhala y baja brazo derecho + pierna izquierda lentamente"},
          {icon:"5️⃣",text:"Vuelve al inicio e intercambia lados. Movimiento lento"},
        ],
        tip:"Si la lumbar se despega, reduce el rango. La calidad manda.",
      },
      {
        id:3, name:"Plancha Lateral", category:"CORE", emoji:"⚡",
        series:3, reps:"25 seg cada lado", restSeconds:20, color:"#f97316",
        isTime:true, timeSeconds:25,
        phases:["Lado izquierdo","Lado derecho"],
        muscles:{principal:["Oblicuos interno y externo"],secundario:["Glúteo medio","Cuadrado lumbar"]},
        steps:[
          {icon:"1️⃣",text:"Apóyate en un antebrazo y en el lateral del pie inferior"},
          {icon:"2️⃣",text:"Cuerpo en línea recta diagonal — no dejes caer la cadera"},
          {icon:"3️⃣",text:"Brazo libre extendido hacia arriba"},
          {icon:"4️⃣",text:"Mantén la posición el tiempo indicado"},
          {icon:"5️⃣",text:"Cambia de lado cuando suene la campanita"},
        ],
        tip:"Puedes apoyar el pie de arriba delante para más estabilidad.",
      },
      {
        id:4, name:"Sentadilla", category:"PIERNAS", emoji:"🦵",
        series:3, reps:"12 reps", restSeconds:30, color:"#3b82f6",
        isTime:false, phases:null,
        muscles:{principal:["Cuádriceps","Glúteos"],secundario:["Isquiotibiales","Gemelos","Core"]},
        steps:[
          {icon:"1️⃣",text:"Pies a la anchura de los hombros, puntas hacia fuera"},
          {icon:"2️⃣",text:"Baja como si fueras a sentarte en una silla"},
          {icon:"3️⃣",text:"Rodillas siguiendo los pies — nunca hacia dentro"},
          {icon:"4️⃣",text:"Espalda recta, pecho arriba, mirada al frente"},
          {icon:"5️⃣",text:"Baja hasta muslos paralelos. Sube empujando con talones"},
        ],
        tip:"Si las rodillas se van hacia dentro, abre más los pies.",
      },
      {
        id:5, name:"Flexiones", category:"TREN SUPERIOR", emoji:"🏋️",
        series:3, reps:"10 reps", restSeconds:30, color:"#8b5cf6",
        isTime:false, phases:null,
        muscles:{principal:["Pectoral mayor","Tríceps"],secundario:["Deltoides anterior","Core"]},
        steps:[
          {icon:"1️⃣",text:"Manos algo más anchas que los hombros"},
          {icon:"2️⃣",text:"Cuerpo recto de cabeza a talones — activa el abdomen"},
          {icon:"3️⃣",text:"Baja el pecho hasta casi tocar el suelo"},
          {icon:"4️⃣",text:"Codos a 45° del cuerpo, no completamente abiertos"},
          {icon:"5️⃣",text:"Si es difícil, apoya las rodillas"},
        ],
        tip:"La bajada controlada (2 seg). La subida puede ser explosiva.",
      },
      {
        id:6, name:"Glute Bridge", category:"GLÚTEOS + CORE", emoji:"🍑",
        series:3, reps:"15 reps", restSeconds:20, color:"#10b981",
        isTime:false, phases:null,
        muscles:{principal:["Glúteo mayor"],secundario:["Isquiotibiales","Core","Suelo pélvico"]},
        steps:[
          {icon:"1️⃣",text:"Tumbado boca arriba, rodillas dobladas, pies en el suelo"},
          {icon:"2️⃣",text:"Sube la cadera empujando con los talones"},
          {icon:"3️⃣",text:"Aprieta los glúteos y mantén 2 segundos arriba"},
          {icon:"4️⃣",text:"Baja lentamente sin dejar caer la cadera"},
          {icon:"5️⃣",text:"La espalda baja no debe arquearse"},
        ],
        tip:"La pausa de 2 seg arriba es clave para la eficacia.",
      },
    ];

    const CIRC = 2 * Math.PI * 54;

    function CircleTimer({value, total, color, running, finished, size=140}) {
      const pct = total > 0 ? ((total - value) / total) * 100 : 0;
      return (
        <div style={{position:"relative",width:size,height:size,margin:"0 auto"}}>
          <svg width={size} height={size} style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
            <circle cx={size/2} cy={size/2} r="54" fill="none" stroke="#1a1a25" strokeWidth="8"/>
            <circle cx={size/2} cy={size/2} r="54" fill="none"
              stroke={finished?"#10b981":color} strokeWidth="8" strokeLinecap="round"
              strokeDasharray={CIRC} strokeDashoffset={CIRC*(1-pct/100)}
              style={{transition:"stroke-dashoffset 1s linear,stroke 0.3s"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            {finished
              ? <div style={{fontSize:40}}>✅</div>
              : <>
                  <div style={{fontFamily:"'Bebas Neue',serif",fontSize:size===160?56:48,lineHeight:1,color:running?color:"#52525b"}}>{value}</div>
                  <div style={{fontSize:10,color:"#3f3f46",letterSpacing:2}}>SEG</div>
                </>
            }
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("home");
      const [idx, setIdx] = useState(0);
      const [serie, setSerie] = useState(1);
      const [phase, setPhase] = useState(0); // 0=left, 1=right for plancha lateral
      const [restT, setRestT] = useState(0);
      const [restOn, setRestOn] = useState(false);
      const [exT, setExT] = useState(0);
      const [exOn, setExOn] = useState(false);
      const [exDone, setExDone] = useState(false);
      const [showSteps, setShowSteps] = useState(false);
      const [activeStep, setActiveStep] = useState(null);
      const [done, setDone] = useState({});
      const restRef = useRef(null);
      const exRef = useRef(null);
      const autoRef = useRef(null);

      const ex = exercises[idx];
      const totalS = exercises.reduce((a,e)=>a+e.series,0);
      const doneCount = Object.values(done).reduce((a,b)=>a+b,0);
      const progress = (doneCount/totalS)*100;
      const hasPhases = ex.phases && ex.phases.length > 0;
      const currentPhaseName = hasPhases ? ex.phases[phase] : null;

      const goToRest = useCallback((currentIdx, currentSerie) => {
        const currentEx = exercises[currentIdx];
        setRestT(currentEx.restSeconds);
        setRestOn(true);
        setScreen("rest");
      }, []);

      const advanceAfterRest = useCallback((currentIdx, currentSerie) => {
        const currentEx = exercises[currentIdx];
        if (currentSerie < currentEx.series) {
          setSerie(currentSerie + 1);
          setPhase(0);
          setShowSteps(false); setActiveStep(null);
          setScreen("workout");
        } else if (currentIdx + 1 < exercises.length) {
          setIdx(currentIdx + 1); setSerie(1); setPhase(0);
          setShowSteps(false); setActiveStep(null);
          setScreen("workout");
        } else {
          setScreen("summary");
        }
      }, []);

      // Rest ticker
      useEffect(() => {
        if (restOn && restT > 0) {
          restRef.current = setInterval(() => {
            setRestT(t => {
              if (t <= 1) {
                clearInterval(restRef.current);
                setRestOn(false);
                playBell();
                return 0;
              }
              return t - 1;
            });
          }, 1000);
        }
        return () => clearInterval(restRef.current);
      }, [restOn]);

      // Auto-advance after rest
      useEffect(() => {
        if (restT === 0 && screen === "rest") {
          autoRef.current = setTimeout(() => advanceAfterRest(idx, serie), 1000);
        }
        return () => clearTimeout(autoRef.current);
      }, [restT, screen]);

      // Exercise ticker
      useEffect(() => {
        if (exOn && exT > 0) {
          exRef.current = setInterval(() => {
            setExT(t => {
              if (t <= 1) {
                clearInterval(exRef.current);
                setExOn(false);
                setExDone(true);
                playBell();
                return 0;
              }
              return t - 1;
            });
          }, 1000);
        }
        return () => clearInterval(exRef.current);
      }, [exOn]);

      // Auto-advance after timed exercise phase completes
      useEffect(() => {
        if (exDone && screen === "workout") {
          autoRef.current = setTimeout(() => {
            setExDone(false);
            if (hasPhases && phase === 0) {
              // Go to second phase (right side) — no rest between sides
              setPhase(1);
              setExT(ex.timeSeconds);
            } else {
              // Full serie done → rest
              setDone(p => ({...p, [ex.id]: (p[ex.id]||0)+1}));
              setPhase(0);
              goToRest(idx, serie);
            }
          }, 1000);
        }
        return () => clearTimeout(autoRef.current);
      }, [exDone, screen]);

      // Init ex timer on exercise/serie/phase change
      useEffect(() => {
        if (screen === "workout") {
          clearInterval(exRef.current);
          setExOn(false); setExDone(false);
          setExT(ex.isTime ? ex.timeSeconds : 0);
        }
      }, [idx, serie, phase, screen]);

      // Unlock + start exercise timer
      const startEx = () => {
        unlockAudio();
        // Play silent buffer to unlock iOS audio
        try {
          const buf = audioCtx.createBuffer(1, 1, 22050);
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          src.connect(audioCtx.destination);
          src.start(0);
        } catch(e) {}
        setExT(ex.timeSeconds); setExDone(false); setExOn(true);
      };

      const pauseEx = () => { clearInterval(exRef.current); setExOn(false); };
      const resetEx = () => { clearInterval(exRef.current); setExOn(false); setExDone(false); setExT(ex.timeSeconds); };

      const skipRest = () => {
        clearInterval(restRef.current); clearTimeout(autoRef.current);
        setRestOn(false); setRestT(0);
        advanceAfterRest(idx, serie);
      };

      const completeSerie = () => {
        setDone(p => ({...p, [ex.id]: (p[ex.id]||0)+1}));
        if (serie < ex.series) {
          setSerie(s => s+1); setPhase(0);
          setRestT(ex.restSeconds); setRestOn(true); setScreen("rest");
        } else if (idx+1 < exercises.length) {
          setIdx(i => i+1); setSerie(1); setPhase(0);
          setShowSteps(false); setActiveStep(null); setScreen("workout");
        } else { setScreen("summary"); }
      };

      const reset = () => {
        clearInterval(restRef.current); clearInterval(exRef.current); clearTimeout(autoRef.current);
        setScreen("home"); setIdx(0); setSerie(1); setPhase(0);
        setRestT(0); setRestOn(false); setExT(0); setExOn(false); setExDone(false);
        setShowSteps(false); setActiveStep(null); setDone({});
      };

      const restPct = ex ? (restT/ex.restSeconds)*100 : 0;
      const B = {fontFamily:"'Bebas Neue',serif"};

      return (
        <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#fff",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px 48px",fontFamily:"'DM Sans',sans-serif"}}>
          <style>{`
            @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
            @keyframes pulse{0%,100%{box-shadow:0 8px 40px rgba(249,115,22,0.35)}50%{box-shadow:0 8px 60px rgba(249,115,22,0.6)}}
            .fu{animation:fadeUp 0.4s ease both}
            .pu{animation:pulse 2.5s ease infinite}
            .sr{transition:all 0.2s ease;cursor:pointer}
            .sr:hover{transform:translateX(4px)}
          `}</style>

          {/* HOME */}
          {screen==="home" && (
            <div className="fu" style={{maxWidth:440,width:"100%"}}>
              <div style={{textAlign:"center",marginBottom:32}}>
                <div style={{display:"inline-block",background:"linear-gradient(135deg,#f97316,#ea580c)",borderRadius:99,padding:"5px 16px",fontSize:10,fontWeight:700,letterSpacing:3,color:"#fff",marginBottom:14}}>PLAN DE ENTRENAMIENTO</div>
                <h1 style={{...B,fontSize:72,lineHeight:0.9,letterSpacing:3,background:"linear-gradient(160deg,#fff 30%,#52525b)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:10}}>CORE &<br/>FUERZA</h1>
                <p style={{color:"#52525b",fontSize:13}}>6 ejercicios · 10–15 min · Sin equipamiento</p>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:24}}>
                {[{v:"6",l:"Ejercicios",i:"🎯"},{v:"18",l:"Series",i:"🔥"},{v:"3x",l:"Semana",i:"📅"}].map(s=>(
                  <div key={s.l} style={{background:"#111118",border:"1px solid #1f1f2e",borderRadius:16,padding:"16px 8px",textAlign:"center"}}>
                    <div style={{fontSize:22,marginBottom:6}}>{s.i}</div>
                    <div style={{...B,fontSize:30,color:"#fff",lineHeight:1}}>{s.v}</div>
                    <div style={{fontSize:10,color:"#3f3f46",letterSpacing:1,marginTop:3}}>{s.l.toUpperCase()}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:28}}>
                {exercises.map((e,i)=>(
                  <div key={e.id} style={{background:"#111118",border:`1px solid ${e.color}20`,borderLeft:`3px solid ${e.color}`,borderRadius:14,padding:"13px 16px",display:"flex",alignItems:"center",gap:14}}>
                    <div style={{width:42,height:42,borderRadius:12,background:`${e.color}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{e.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                        <span style={{fontWeight:700,fontSize:14,color:"#f4f4f5"}}>{e.name}</span>
                        <span style={{background:`${e.color}18`,color:e.color,borderRadius:6,padding:"1px 7px",fontSize:9,fontWeight:700,letterSpacing:1}}>{e.category}</span>
                        {e.isTime && <span style={{background:"#1f1f2e",color:"#71717a",borderRadius:6,padding:"1px 7px",fontSize:9}}>⏱</span>}
                      </div>
                      <div style={{color:"#3f3f46",fontSize:12}}>{e.series} series · {e.reps}</div>
                    </div>
                    <div style={{...B,color:"#27272a",fontSize:22}}>0{i+1}</div>
                  </div>
                ))}
              </div>
              <button className="pu" onClick={()=>setScreen("workout")} style={{background:"linear-gradient(135deg,#f97316,#ea580c)",border:"none",borderRadius:16,color:"#fff",fontSize:15,fontWeight:700,padding:"18px",cursor:"pointer",width:"100%",letterSpacing:1,boxShadow:"0 8px 40px rgba(249,115,22,0.35)"}}>
                COMENZAR ENTRENAMIENTO →
              </button>
            </div>
          )}

          {/* WORKOUT */}
          {screen==="workout" && (
            <div className="fu" style={{maxWidth:440,width:"100%"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
                <button onClick={reset} style={{background:"#111118",border:"1px solid #1f1f2e",borderRadius:10,color:"#71717a",width:36,height:36,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:10,color:"#3f3f46",letterSpacing:1}}>EJERCICIO {idx+1}/{exercises.length}</span>
                    <span style={{fontSize:10,color:"#3f3f46"}}>{Math.round(progress)}%</span>
                  </div>
                  <div style={{background:"#17171f",borderRadius:99,height:5}}>
                    <div style={{height:"100%",borderRadius:99,background:`linear-gradient(90deg,${ex.color},${ex.color}88)`,width:`${progress}%`,transition:"width 0.6s ease"}}/>
                  </div>
                </div>
              </div>

              <div style={{background:"#111118",border:`1px solid ${ex.color}28`,borderRadius:24,padding:24,marginBottom:12,position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:-50,right:-50,width:180,height:180,borderRadius:"50%",background:`${ex.color}08`,filter:"blur(50px)",pointerEvents:"none"}}/>

                <div style={{marginBottom:16}}>
                  <span style={{fontSize:10,fontWeight:700,letterSpacing:2,color:ex.color,display:"block",marginBottom:6}}>{ex.category}</span>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:38}}>{ex.emoji}</span>
                    <div>
                      <h2 style={{...B,fontSize:42,lineHeight:1,letterSpacing:1}}>{ex.name}</h2>
                      {currentPhaseName && (
                        <div style={{marginTop:4,display:"inline-block",background:phase===0?"#3b82f620":"#10b98120",border:`1px solid ${phase===0?"#3b82f6":"#10b981"}`,borderRadius:8,padding:"3px 10px",fontSize:13,fontWeight:700,color:phase===0?"#3b82f6":"#10b981"}}>
                          {phase===0?"◀":"▶"} {currentPhaseName}
                        </div>
                      )}
                    </div>
                  </div>
                </div>

                <div style={{display:"flex",gap:7,marginBottom:16}}>
                  {Array.from({length:ex.series}).map((_,i)=>(
                    <div key={i} style={{height:5,flex:1,borderRadius:99,background:i<serie?ex.color:"#1f1f2e",transition:"background 0.3s"}}/>
                  ))}
                </div>

                <div style={{background:`${ex.color}10`,border:`1px solid ${ex.color}25`,borderRadius:14,padding:"12px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div>
                    <div style={{fontSize:10,color:"#3f3f46",letterSpacing:1}}>SERIE ACTUAL</div>
                    <div style={{...B,fontSize:38,lineHeight:1,color:ex.color}}>{serie} <span style={{color:"#27272a",fontSize:24}}>/ {ex.series}</span></div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:10,color:"#3f3f46",letterSpacing:1}}>OBJETIVO</div>
                    <div style={{...B,fontSize:26,lineHeight:1.1,color:"#f4f4f5"}}>{ex.reps}</div>
                  </div>
                </div>

                {/* EXERCISE TIMER */}
                {ex.isTime && (
                  <div style={{background:"#0d0d14",border:`2px solid ${ex.color}50`,borderRadius:20,padding:"20px 16px",marginBottom:16,textAlign:"center"}}>
                    <div style={{fontSize:11,color:ex.color,letterSpacing:2,fontWeight:700,marginBottom:4}}>⏱ TEMPORIZADOR</div>
                    {currentPhaseName && (
                      <div style={{fontSize:12,color:"#71717a",marginBottom:12}}>
                        {phase===0?"◀ Lado izquierdo":"▶ Lado derecho"}
                      </div>
                    )}
                    <CircleTimer value={exT} total={ex.timeSeconds} color={ex.color} running={exOn} finished={exDone}/>
                    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:16}}>
                      {!exOn && !exDone && exT===ex.timeSeconds && (
                        <button onClick={startEx} style={{background:`linear-gradient(135deg,${ex.color},${ex.color}bb)`,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,padding:"12px 28px",cursor:"pointer"}}>
                          ▶ INICIAR
                        </button>
                      )}
                      {exOn && (
                        <button onClick={pauseEx} style={{background:"#17171f",border:`1px solid ${ex.color}50`,borderRadius:12,color:ex.color,fontSize:15,fontWeight:700,padding:"12px 28px",cursor:"pointer"}}>
                          ⏸ PAUSAR
                        </button>
                      )}
                      {!exOn && !exDone && exT < ex.timeSeconds && (
                        <>
                          <button onClick={()=>{unlockAudio();setExOn(true);}} style={{background:`linear-gradient(135deg,${ex.color},${ex.color}bb)`,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,padding:"12px 20px",cursor:"pointer"}}>▶ Continuar</button>
                          <button onClick={resetEx} style={{background:"#17171f",border:"1px solid #27272a",borderRadius:12,color:"#71717a",fontSize:15,fontWeight:700,padding:"12px 16px",cursor:"pointer"}}>↺</button>
                        </>
                      )}
                    </div>
                    {exDone && (
                      <div style={{marginTop:14,fontSize:13,fontWeight:700,color:"#10b981"}}>
                        {hasPhases && phase===0 ? "✅ ¡Cambia al lado derecho!" : "✅ Pasando al descanso..."}
                      </div>
                    )}
                  </div>
                )}

                {/* MUSCLES */}
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:10,color:"#3f3f46",letterSpacing:2,marginBottom:8}}>MÚSCULOS</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {ex.muscles.principal.map(m=><span key={m} style={{background:`${ex.color}18`,border:`1px solid ${ex.color}35`,borderRadius:8,padding:"4px 10px",fontSize:12,color:ex.color,fontWeight:600}}>{m}</span>)}
                    {ex.muscles.secundario.map(m=><span key={m} style={{background:"#17171f",border:"1px solid #27272a",borderRadius:8,padding:"4px 10px",fontSize:12,color:"#52525b"}}>{m}</span>)}
                  </div>
                </div>

                {/* STEPS */}
                <button onClick={()=>{setShowSteps(!showSteps);setActiveStep(null);}} style={{background:showSteps?`${ex.color}12`:"#17171f",border:`1px solid ${showSteps?ex.color+"35":"#27272a"}`,borderRadius:12,color:showSteps?ex.color:"#71717a",fontSize:13,fontWeight:600,padding:"10px 16px",cursor:"pointer",width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>📋 Cómo se hace — paso a paso</span>
                  <span style={{fontSize:11,opacity:0.7}}>{showSteps?"▲ ocultar":"▼ ver"}</span>
                </button>
                {showSteps && (
                  <div style={{marginTop:12}}>
                    <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:10}}>
                      {ex.steps.map((s,i)=>(
                        <div key={i} className="sr" onClick={()=>setActiveStep(activeStep===i?null:i)}
                          style={{background:activeStep===i?`${ex.color}12`:"#17171f",border:`1px solid ${activeStep===i?ex.color+"30":"#222230"}`,borderRadius:12,padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
                          <span style={{fontSize:15,flexShrink:0}}>{s.icon}</span>
                          <span style={{fontSize:13,lineHeight:1.55,color:activeStep===i?"#f4f4f5":"#71717a",fontWeight:activeStep===i?500:400}}>{s.text}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{background:"#17171f",border:"1px solid #222230",borderRadius:12,padding:"10px 14px",display:"flex",gap:10}}>
                      <span>💡</span>
                      <span style={{fontSize:12,color:"#52525b",lineHeight:1.55}}><strong style={{color:"#71717a"}}>Consejo:</strong> {ex.tip}</span>
                    </div>
                  </div>
                )}
              </div>

              {/* Manual button — only for rep-based */}
              {!ex.isTime && (
                <button onClick={completeSerie} style={{background:`linear-gradient(135deg,${ex.color},${ex.color}bb)`,border:"none",borderRadius:16,color:"#fff",fontSize:14,fontWeight:700,padding:"18px",cursor:"pointer",width:"100%",letterSpacing:0.8,boxShadow:`0 8px 30px ${ex.color}30`}}>
                  {serie<ex.series?`✅ SERIE ${serie} COMPLETADA → DESCANSO`:idx+1<exercises.length?"✅ EJERCICIO COMPLETO → SIGUIENTE":"🏆 ¡ÚLTIMO EJERCICIO COMPLETADO!"}
                </button>
              )}
            </div>
          )}

          {/* REST */}
          {screen==="rest" && (
            <div className="fu" style={{maxWidth:440,width:"100%",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#3f3f46",letterSpacing:3,marginBottom:28}}>TIEMPO DE RECUPERACIÓN</div>
              <div style={{position:"relative",width:160,height:160,margin:"0 auto 32px"}}>
                <svg width="160" height="160" style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
                  <circle cx="80" cy="80" r="54" fill="none" stroke="#1a1a25" strokeWidth="8"/>
                  <circle cx="80" cy="80" r="54" fill="none" stroke={ex.color} strokeWidth="8" strokeLinecap="round"
                    strokeDasharray={CIRC} strokeDashoffset={CIRC*(1-restPct/100)}
                    style={{transition:"stroke-dashoffset 1s linear"}}/>
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                  {restT===0
                    ? <div style={{fontSize:40}}>✅</div>
                    : <><div style={{...B,fontSize:56,lineHeight:1,color:ex.color}}>{restT}</div><div style={{fontSize:10,color:"#3f3f46",letterSpacing:2}}>SEG</div></>
                  }
                </div>
              </div>
              <div style={{background:"#111118",border:`1px solid ${ex.color}22`,borderRadius:16,padding:"16px 20px",marginBottom:24,textAlign:"left"}}>
                <div style={{fontSize:10,color:"#3f3f46",letterSpacing:2,marginBottom:8}}>SIGUIENTE</div>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:26}}>{ex.emoji}</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:15,color:"#f4f4f5"}}>{ex.name} — Serie {serie}</div>
                    <div style={{fontSize:12,color:"#3f3f46",marginTop:2}}>{ex.reps}</div>
                  </div>
                </div>
              </div>
              <button onClick={skipRest} style={{background:"#17171f",border:"1px solid #27272a",borderRadius:14,color:"#71717a",fontSize:14,fontWeight:600,padding:"14px 40px",cursor:"pointer"}}>
                Saltar descanso →
              </button>
            </div>
          )}

          {/* SUMMARY */}
          {screen==="summary" && (
            <div className="fu" style={{maxWidth:440,width:"100%",textAlign:"center"}}>
              <div style={{fontSize:60,marginBottom:14}}>🏆</div>
              <h2 style={{...B,fontSize:60,lineHeight:1,letterSpacing:2,background:"linear-gradient(135deg,#fbbf24,#f97316)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6}}>¡COMPLETADO!</h2>
              <p style={{color:"#52525b",fontSize:13,marginBottom:28}}>Has trabajado todos los grupos musculares</p>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
                {exercises.map(e=>(
                  <div key={e.id} style={{background:"#111118",border:`1px solid ${e.color}20`,borderLeft:`3px solid ${e.color}`,borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                    <span style={{fontSize:18}}>✅</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#f4f4f5"}}>{e.name}</div>
                      <div style={{fontSize:12,color:"#3f3f46"}}>{e.series} series · {e.reps}</div>
                    </div>
                    <span style={{background:`${e.color}15`,color:e.color,borderRadius:8,padding:"2px 8px",fontSize:9,fontWeight:700,letterSpacing:1}}>{e.category}</span>
                  </div>
                ))}
              </div>
              <button onClick={reset} style={{background:"linear-gradient(135deg,#f97316,#ea580c)",border:"none",borderRadius:16,color:"#fff",fontSize:15,fontWeight:700,padding:"18px",cursor:"pointer",width:"100%",boxShadow:"0 8px 40px rgba(249,115,22,0.3)",letterSpacing:0.8}}>
                VOLVER AL INICIO 🏠
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
    }
  </script>
</body>
</html>
