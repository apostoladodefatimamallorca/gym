<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Core Fuerza"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>Core y Fuerza</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh}
#app{max-width:440px;margin:0 auto;padding:24px 16px 48px}
.bb{font-family:'Bebas Neue',serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 8px 40px rgba(249,115,22,.4)}50%{box-shadow:0 8px 60px rgba(249,115,22,.7)}}
.fade{animation:fadeUp .35s ease both}
.glow{animation:glow 2.5s ease infinite}
btn{font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── AUDIO ──
// Single AudioContext, unlocked on first tap, never recreated
var _ac = null;
function _unlockAudio() {
  if (!_ac) {
    _ac = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_ac.state === 'suspended') _ac.resume();
}
function _bell() {
  if (!_ac || _ac.state !== 'running') return;
  var t = _ac.currentTime;
  var g = _ac.createGain();
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
  g.connect(_ac.destination);
  [1046, 1318].forEach(function(f) {
    var o = _ac.createOscillator();
    o.type = 'sine';
    o.frequency.value = f;
    o.connect(g);
    o.start(t);
    o.stop(t + 1.0);
  });
}

// ── DATA ──
var EX = [
  {name:"Plancha Frontal",cat:"CORE",em:"💪",series:3,reps:"30 seg",rest:20,col:"#f97316",isTime:true,secs:30,sides:false,
   mp:["Core completo","Transverso abdominal"],ms:["Hombros","Glúteos"],
   steps:["Apóyate en antebrazos y puntas de los pies","Cuerpo recto de cabeza a talones","Abdomen contraído — sin hundir ni elevar caderas","Cuello neutro, mirada al suelo","Respira con normalidad durante todo el tiempo"],
   tip:"Si la cadera cae, reduce el tiempo y hazlo bien."},
  {name:"Dead Bug",cat:"CORE",em:"🪲",series:3,reps:"10 cada lado",rest:20,col:"#f97316",isTime:false,secs:0,sides:false,
   mp:["Transverso abdominal","Multífidos"],ms:["Recto abdominal","Psoas"],
   steps:["Tumbado boca arriba, brazos hacia el techo","Caderas y rodillas a 90 grados, piernas en el aire","Zona lumbar PEGADA al suelo","Exhala y baja brazo derecho y pierna izquierda lentamente","Vuelve al inicio e intercambia lados"],
   tip:"Si la lumbar se despega, reduce el rango."},
  {name:"Plancha Lateral",cat:"CORE",em:"⚡",series:3,reps:"25 seg cada lado",rest:20,col:"#f97316",isTime:true,secs:25,sides:true,
   mp:["Oblicuos interno y externo"],ms:["Glúteo medio","Cuadrado lumbar"],
   steps:["Apóyate en un antebrazo y lateral del pie","Cuerpo en línea recta diagonal","Brazo libre extendido hacia arriba","25 seg lado izquierdo, luego 25 seg lado derecho","La campanita indica cuando cambiar de lado"],
   tip:"Apoya el pie de arriba delante para más estabilidad."},
  {name:"Sentadilla",cat:"PIERNAS",em:"🦵",series:3,reps:"12 reps",rest:30,col:"#3b82f6",isTime:false,secs:0,sides:false,
   mp:["Cuádriceps","Glúteos"],ms:["Isquiotibiales","Gemelos","Core"],
   steps:["Pies a anchura de hombros, puntas hacia fuera","Baja como si fueras a sentarte en una silla","Rodillas siguiendo los pies, nunca hacia dentro","Espalda recta, pecho arriba, mirada al frente","Sube empujando con los talones"],
   tip:"Si las rodillas van hacia dentro, abre más los pies."},
  {name:"Flexiones",cat:"TREN SUPERIOR",em:"🏋️",series:3,reps:"10 reps",rest:30,col:"#8b5cf6",isTime:false,secs:0,sides:false,
   mp:["Pectoral mayor","Tríceps"],ms:["Deltoides anterior","Core"],
   steps:["Manos algo más anchas que los hombros","Cuerpo recto de cabeza a talones","Baja el pecho hasta casi tocar el suelo","Codos a 45 grados del cuerpo","Si es difícil, apoya las rodillas"],
   tip:"Bajada controlada 2 seg. Subida puede ser explosiva."},
  {name:"Glute Bridge",cat:"GLUTEOS+CORE",em:"🍑",series:3,reps:"15 reps",rest:20,col:"#10b981",isTime:false,secs:0,sides:false,
   mp:["Glúteo mayor"],ms:["Isquiotibiales","Core","Suelo pélvico"],
   steps:["Tumbado boca arriba, rodillas dobladas, pies en suelo","Sube la cadera empujando con los talones","Aprieta glúteos y mantén 2 segundos arriba","Baja lentamente sin dejar caer la cadera","La espalda baja no debe arquearse"],
   tip:"La pausa de 2 seg arriba es clave para la eficacia."}
];
var TOTAL_S = EX.reduce(function(a,e){return a+e.series;},0);
var C = 2*Math.PI*54; // SVG circumference

// ── STATE ──
var ei=0,sr=1,sd=0,dt=0,rt=0,eon=false,edn=false,sst=false,ast=-1,ds=0,scr="home";
// ei=exerciseIndex, sr=serie, sd=side(0=left,1=right), dt=exerciseTimer, rt=restTimer
// eon=exerciseOn, edn=exerciseDone, sst=showSteps, ast=activeStep, ds=doneSeries

// ── TIMERS: use Date-based countdown for accuracy ──
var _exEnd=0, _rtEnd=0, _exRaf=0, _rtRaf=0, _pend=0;

function _stopAll() {
  cancelAnimationFrame(_exRaf); _exRaf=0;
  cancelAnimationFrame(_rtRaf); _rtRaf=0;
  clearTimeout(_pend); _pend=0;
}

function _tickEx(cb) {
  cancelAnimationFrame(_exRaf);
  function frame() {
    var rem = Math.ceil((_exEnd - Date.now()) / 1000);
    if (rem < 0) rem = 0;
    if (rem !== dt) {
      dt = rem;
      _updateExCircle();
    }
    if (rem > 0) {
      _exRaf = requestAnimationFrame(frame);
    } else {
      _exRaf = 0;
      eon = false; edn = true;
      _bell();
      render(); // full render to show done state + change buttons
      _pend = setTimeout(cb, 1200);
    }
  }
  _exRaf = requestAnimationFrame(frame);
}

function _tickRest(cb) {
  cancelAnimationFrame(_rtRaf);
  function frame() {
    var rem = Math.ceil((_rtEnd - Date.now()) / 1000);
    if (rem < 0) rem = 0;
    if (rem !== rt) {
      rt = rem;
      _updateRestCircle();
    }
    if (rem > 0) {
      _rtRaf = requestAnimationFrame(frame);
    } else {
      _rtRaf = 0;
      _bell();
      render(); // show checkmark
      _pend = setTimeout(cb, 1200);
    }
  }
  _rtRaf = requestAnimationFrame(frame);
}

// ── CIRCLE SVG (returns HTML string) ──
function _svg(val, total, col, done, sz) {
  sz = sz||140;
  var p = total>0 ? ((total-val)/total)*100 : 0;
  var off = C*(1-p/100);
  var fc = done?"#10b981":col;
  var fs = sz===160?52:44;
  var nc = (val>0&&val<total)?col:"#52525b";
  var inner = done
    ? "<div style='font-size:32px'>✅</div>"
    : "<div class='bb' style='font-size:"+fs+"px;line-height:1;color:"+nc+"'>"+val+"</div>"
      +"<div style='font-size:9px;color:#3f3f46;letter-spacing:2px;margin-top:2px'>SEG</div>";
  return "<div style='position:relative;width:"+sz+"px;height:"+sz+"px;margin:0 auto'>"
    +"<svg width='"+sz+"' height='"+sz+"' viewBox='0 0 140 140' style='position:absolute;inset:0;transform:rotate(-90deg)'>"
    +"<circle cx='70' cy='70' r='54' fill='none' stroke='#1a1a25' stroke-width='8'/>"
    +"<circle cx='70' cy='70' r='54' fill='none' stroke='"+fc+"' stroke-width='8' stroke-linecap='round'"
    +" stroke-dasharray='"+C+"' stroke-dashoffset='"+off+"' style='transition:stroke-dashoffset 1s linear'/>"
    +"</svg>"
    +"<div style='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center'>"+inner+"</div>"
    +"</div>";
}

// Partial DOM updates — only touch the circle elements
function _updateExCircle() {
  var e=EX[ei], tc=e.sides?(sd===0?"#3b82f6":"#10b981"):e.col;
  var el=document.getElementById("ec");
  if(el) el.innerHTML=_svg(dt,e.secs,tc,edn,140);
}
function _updateRestCircle() {
  var e=EX[ei];
  var el=document.getElementById("rc");
  if(el) el.innerHTML=_svg(rt,e.rest,e.col,rt===0,160);
}

// ── RENDER (full page) ──
function render() {
  var e=EX[ei], prog=Math.round((ds/TOTAL_S)*100);

  if(scr==="home") { _renderHome(); return; }
  if(scr==="workout") { _renderWorkout(e,prog); return; }
  if(scr==="rest") { _renderRest(e); return; }
  if(scr==="summary") { _renderSummary(); }
}

function _card(col,inner) {
  return "<div style='background:#111118;border:1px solid "+col+"28;border-radius:24px;padding:24px;margin-bottom:12px;position:relative;overflow:hidden'>"
    +"<div style='position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:"+col+"08;filter:blur(50px);pointer-events:none'></div>"
    +inner+"</div>";
}

function _renderHome() {
  var rows=EX.map(function(ex,i){
    return "<div style='background:#111118;border:1px solid "+ex.col+"22;border-left:3px solid "+ex.col+";border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px'>"
      +"<div style='width:42px;height:42px;border-radius:12px;background:"+ex.col+"18;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0'>"+ex.em+"</div>"
      +"<div style='flex:1'><div style='font-weight:700;font-size:14px;color:#f4f4f5;margin-bottom:3px'>"+ex.name
      +" <span style='background:"+ex.col+"18;color:"+ex.col+";border-radius:6px;padding:1px 7px;font-size:9px;font-weight:700;letter-spacing:1px'>"+ex.cat+"</span>"
      +(ex.isTime?" <span style='background:#1f1f2e;color:#71717a;border-radius:6px;padding:1px 7px;font-size:9px'>⏱</span>":"")
      +"</div><div style='color:#3f3f46;font-size:12px'>"+ex.series+" series · "+ex.reps+"</div></div>"
      +"<div class='bb' style='color:#27272a;font-size:22px'>0"+(i+1)+"</div></div>";
  }).join("");
  document.getElementById("app").innerHTML="<div class='fade'>"
    +"<div style='text-align:center;margin-bottom:28px'>"
    +"<div style='display:inline-block;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:99px;padding:5px 16px;font-size:10px;font-weight:700;letter-spacing:3px;color:#fff;margin-bottom:14px'>PLAN DE ENTRENAMIENTO</div>"
    +"<h1 class='bb' style='font-size:68px;line-height:.9;letter-spacing:3px;background:linear-gradient(160deg,#fff 30%,#52525b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px'>CORE<br>Y FUERZA</h1>"
    +"<p style='color:#52525b;font-size:13px'>6 ejercicios · 10-15 min · Sin equipamiento</p></div>"
    +"<div style='display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px'>"
    +[["🎯","6","EJERCICIOS"],["🔥","18","SERIES"],["📅","3x","SEMANA"]].map(function(d){
      return "<div style='background:#111118;border:1px solid #1f1f2e;border-radius:16px;padding:14px 8px;text-align:center'>"
        +"<div style='font-size:20px;margin-bottom:5px'>"+d[0]+"</div>"
        +"<div class='bb' style='font-size:28px;color:#fff;line-height:1'>"+d[1]+"</div>"
        +"<div style='font-size:10px;color:#3f3f46;letter-spacing:1px;margin-top:2px'>"+d[2]+"</div></div>";
    }).join("")+"</div>"
    +rows
    +"<button class='glow' onclick='goW()' style='font-family:DM Sans,sans-serif;background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:16px;color:#fff;font-size:15px;font-weight:700;padding:18px;width:100%;letter-spacing:1px;margin-top:4px;cursor:pointer'>COMENZAR ENTRENAMIENTO →</button>"
    +"</div>";
}

function _renderWorkout(e,prog) {
  var sCol=sd===0?"#3b82f6":"#10b981";
  var sLbl=sd===0?"◀ LADO IZQUIERDO":"▶ LADO DERECHO";
  var tc=e.sides?sCol:e.col;

  var timerHtml="";
  if(e.isTime){
    var sideDiv=e.sides
      ?"<div style='margin-bottom:12px;background:"+sCol+"20;border:2px solid "+sCol+";border-radius:12px;padding:8px 16px;display:inline-block'>"
        +"<span class='bb' style='font-size:22px;color:"+sCol+";letter-spacing:1px'>"+sLbl+"</span></div>"
      :"";
    var btns="";
    if(!eon&&!edn) {
      btns="<button onclick='startEx()' style='font-family:DM Sans,sans-serif;background:linear-gradient(135deg,"+e.col+","+e.col+"bb);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;padding:12px 28px;cursor:pointer'>▶ INICIAR</button>";
    } else if(eon) {
      btns="<button onclick='pauseEx()' style='font-family:DM Sans,sans-serif;background:#17171f;border:1px solid "+e.col+"50;border-radius:12px;color:"+e.col+";font-size:15px;font-weight:700;padding:12px 28px;cursor:pointer'>⏸ PAUSAR</button>";
    } else if(edn) {
      btns="<button onclick='startEx()' style='font-family:DM Sans,sans-serif;background:#17171f;border:1px solid #27272a;border-radius:12px;color:#71717a;font-size:15px;font-weight:700;padding:12px 16px;cursor:pointer'>↺ Repetir</button>";
    }
    var doneMsg=edn?"<div style='margin-top:12px;font-size:14px;font-weight:700;color:#10b981'>"+(e.sides&&sd===0?"✅ ¡Cambia al LADO DERECHO!":"✅ Pasando al descanso...")+"</div>":"";
    timerHtml="<div style='background:#0d0d14;border:2px solid "+e.col+"50;border-radius:20px;padding:20px 16px;margin-bottom:16px;text-align:center'>"
      +"<div style='font-size:11px;color:"+e.col+";letter-spacing:2px;font-weight:700;margin-bottom:10px'>⏱ TEMPORIZADOR</div>"
      +sideDiv
      +"<div id='ec'>"+_svg(dt,e.secs,tc,edn,140)+"</div>"
      +"<div style='display:flex;gap:8px;justify-content:center;margin-top:14px'>"+btns+"</div>"
      +doneMsg+"</div>";
  }

  var stHtml="";
  if(sst){
    stHtml="<div style='margin-top:12px'>"
      +e.steps.map(function(st,i){
        var a=ast===i;
        return "<div onclick='togStep("+i+")' style='background:"+(a?e.col+"12":"#17171f")+";border:1px solid "+(a?e.col+"30":"#222230")+";border-radius:12px;padding:10px 14px;display:flex;gap:10px;margin-bottom:6px;cursor:pointer'>"
          +"<span style='font-size:14px;flex-shrink:0'>"+(i+1)+".</span>"
          +"<span style='font-size:13px;line-height:1.55;color:"+(a?"#f4f4f5":"#71717a")+";font-weight:"+(a?"600":"400")+"'>"+st+"</span></div>";
      }).join("")
      +"<div style='background:#17171f;border:1px solid #222230;border-radius:12px;padding:10px 14px;display:flex;gap:10px'>"
      +"<span>💡</span><span style='font-size:12px;color:#52525b;line-height:1.55'><strong style='color:#71717a'>Consejo:</strong> "+e.tip+"</span></div></div>";
  }

  var mBtn=!e.isTime
    ?"<button onclick='compSerie()' style='font-family:DM Sans,sans-serif;background:linear-gradient(135deg,"+e.col+","+e.col+"bb);border:none;border-radius:16px;color:#fff;font-size:14px;font-weight:700;padding:18px;width:100%;letter-spacing:.8px;cursor:pointer'>"
      +(sr<e.series?"✅ SERIE "+sr+" COMPLETADA → DESCANSO":ei+1<EX.length?"✅ EJERCICIO COMPLETO → SIGUIENTE":"🏆 ULTIMO EJERCICIO")+"</button>"
    :"";

  document.getElementById("app").innerHTML="<div class='fade'>"
    +"<div style='display:flex;align-items:center;gap:12px;margin-bottom:18px'>"
    +"<button onclick='doReset()' style='font-family:DM Sans,sans-serif;background:#111118;border:1px solid #1f1f2e;border-radius:10px;color:#71717a;width:36px;height:36px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer'>←</button>"
    +"<div style='flex:1'><div style='display:flex;justify-content:space-between;margin-bottom:5px'>"
    +"<span style='font-size:10px;color:#3f3f46;letter-spacing:1px'>EJERCICIO "+(ei+1)+"/"+EX.length+"</span>"
    +"<span style='font-size:10px;color:#3f3f46'>"+prog+"%</span></div>"
    +"<div style='background:#17171f;border-radius:99px;height:5px'>"
    +"<div style='height:100%;border-radius:99px;background:linear-gradient(90deg,"+e.col+","+e.col+"88);width:"+prog+"%;transition:width .6s ease'></div></div></div></div>"
    +_card(e.col,
      "<div style='margin-bottom:16px'>"
      +"<span style='font-size:10px;font-weight:700;letter-spacing:2px;color:"+e.col+";display:block;margin-bottom:6px'>"+e.cat+"</span>"
      +"<div style='display:flex;align-items:center;gap:12px'><span style='font-size:38px'>"+e.em+"</span>"
      +"<h2 class='bb' style='font-size:42px;line-height:1;letter-spacing:1px'>"+e.name+"</h2></div></div>"
      +"<div style='display:flex;gap:7px;margin-bottom:16px'>"
      +Array.from({length:e.series}).map(function(_,i){return "<div style='height:5px;flex:1;border-radius:99px;background:"+(i<sr?e.col:"#1f1f2e")+";transition:background .3s'></div>";}).join("")
      +"</div>"
      +"<div style='background:"+e.col+"10;border:1px solid "+e.col+"25;border-radius:14px;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px'>"
      +"<div><div style='font-size:10px;color:#3f3f46;letter-spacing:1px'>SERIE ACTUAL</div>"
      +"<div class='bb' style='font-size:38px;line-height:1;color:"+e.col+"'>"+sr+" <span style='color:#27272a;font-size:24px'>/ "+e.series+"</span></div></div>"
      +"<div style='text-align:right'><div style='font-size:10px;color:#3f3f46;letter-spacing:1px'>OBJETIVO</div>"
      +"<div class='bb' style='font-size:22px;color:#f4f4f5'>"+e.reps+"</div></div></div>"
      +timerHtml
      +"<div style='margin-bottom:16px'><div style='font-size:10px;color:#3f3f46;letter-spacing:2px;margin-bottom:8px'>MUSCULOS</div>"
      +"<div style='display:flex;flex-wrap:wrap;gap:6px'>"
      +e.mp.map(function(m){return "<span style='background:"+e.col+"18;border:1px solid "+e.col+"35;border-radius:8px;padding:4px 10px;font-size:12px;color:"+e.col+";font-weight:600'>"+m+"</span>";}).join("")
      +e.ms.map(function(m){return "<span style='background:#17171f;border:1px solid #27272a;border-radius:8px;padding:4px 10px;font-size:12px;color:#52525b'>"+m+"</span>";}).join("")
      +"</div></div>"
      +"<button onclick='togSteps()' style='font-family:DM Sans,sans-serif;background:"+(sst?e.col+"12":"#17171f")+";border:1px solid "+(sst?e.col+"35":"#27272a")+";border-radius:12px;color:"+(sst?e.col:"#71717a")+";font-size:13px;font-weight:600;padding:10px 16px;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer'>"
      +"<span>📋 Como se hace — paso a paso</span><span style='font-size:11px'>"+(sst?"▲":"▼")+"</span></button>"
      +stHtml
    )
    +mBtn+"</div>";
}

function _renderRest(e) {
  document.getElementById("app").innerHTML="<div class='fade' style='text-align:center'>"
    +"<div style='font-size:10px;color:#3f3f46;letter-spacing:3px;margin-bottom:28px'>TIEMPO DE RECUPERACION</div>"
    +"<div id='rc'>"+_svg(rt,e.rest,e.col,rt===0,160)+"</div>"
    +"<div style='background:#111118;border:1px solid "+e.col+"22;border-radius:16px;padding:16px 20px;margin:24px 0;text-align:left'>"
    +"<div style='font-size:10px;color:#3f3f46;letter-spacing:2px;margin-bottom:8px'>SIGUIENTE</div>"
    +"<div style='display:flex;align-items:center;gap:12px'><span style='font-size:26px'>"+e.em+"</span>"
    +"<div><div style='font-weight:700;font-size:15px;color:#f4f4f5'>"+e.name+" — Serie "+sr+"</div>"
    +"<div style='font-size:12px;color:#3f3f46;margin-top:2px'>"+e.reps+"</div></div></div></div>"
    +"<button onclick='skipRest()' style='font-family:DM Sans,sans-serif;background:#17171f;border:1px solid #27272a;border-radius:14px;color:#71717a;font-size:14px;font-weight:600;padding:14px 40px;cursor:pointer'>Saltar descanso →</button>"
    +"</div>";
}

function _renderSummary() {
  document.getElementById("app").innerHTML="<div class='fade' style='text-align:center'>"
    +"<div style='font-size:56px;margin-bottom:14px'>🏆</div>"
    +"<h2 class='bb' style='font-size:56px;line-height:1;letter-spacing:2px;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px'>COMPLETADO</h2>"
    +"<p style='color:#52525b;font-size:13px;margin-bottom:24px'>Has trabajado todos los grupos musculares</p>"
    +EX.map(function(ex){
      return "<div style='background:#111118;border:1px solid "+ex.col+"20;border-left:3px solid "+ex.col+";border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;text-align:left;margin-bottom:8px'>"
        +"<span style='font-size:18px'>✅</span><div style='flex:1'>"
        +"<div style='font-weight:700;font-size:14px;color:#f4f4f5'>"+ex.name+"</div>"
        +"<div style='font-size:12px;color:#3f3f46'>"+ex.series+" series · "+ex.reps+"</div></div>"
        +"<span style='background:"+ex.col+"15;color:"+ex.col+";border-radius:8px;padding:2px 8px;font-size:9px;font-weight:700'>"+ex.cat+"</span></div>";
    }).join("")
    +"<button onclick='doReset()' style='font-family:DM Sans,sans-serif;background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:16px;color:#fff;font-size:15px;font-weight:700;padding:18px;width:100%;margin-top:16px;cursor:pointer'>VOLVER AL INICIO 🏠</button>"
    +"</div>";
}

// ── NAVIGATION ──
function _nextAfterRest() {
  var e=EX[ei];
  if(sr<e.series){ sr++; }
  else { ei++; sr=1; }
  sd=0; dt=EX[ei]&&EX[ei].isTime?EX[ei].secs:0;
  eon=false; edn=false; sst=false; ast=-1;
  scr="workout"; render();
}

function _afterExDone() {
  var e=EX[ei];
  edn=false;
  if(e.sides&&sd===0){
    // Switch to right side — auto start
    sd=1; dt=e.secs;
    render();
    _exEnd=Date.now()+e.secs*1000;
    eon=true;
    _tickEx(function(){
      edn=false; sd=0; ds++;
      _startRest();
    });
  } else {
    sd=0; ds++;
    _startRest();
  }
}

function _startRest() {
  var e=EX[ei];
  rt=e.rest; scr="rest"; render();
  _rtEnd=Date.now()+e.rest*1000;
  _tickRest(_nextAfterRest);
}

// ── BUTTON HANDLERS ──
function goW(){
  dt=EX[ei].isTime?EX[ei].secs:0;
  scr="workout"; render();
}

function startEx(){
  _unlockAudio(); // unlock inside user tap
  var e=EX[ei];
  edn=false; eon=true;
  dt=e.secs; // reset to full time
  _exEnd=Date.now()+e.secs*1000;
  render(); // show PAUSAR button
  _tickEx(_afterExDone);
}

function pauseEx(){
  cancelAnimationFrame(_exRaf); _exRaf=0;
  clearTimeout(_pend); _pend=0;
  eon=false; render();
}

function skipRest(){
  _stopAll(); rt=0;
  _nextAfterRest();
}

function compSerie(){
  _stopAll();
  var e=EX[ei]; ds++;
  if(sr<e.series){ sr++; _startRest(); }
  else if(ei+1<EX.length){ ei++; sr=1; sd=0; dt=EX[ei].isTime?EX[ei].secs:0; eon=false; edn=false; sst=false; ast=-1; scr="workout"; render(); }
  else { scr="summary"; render(); }
}

function togSteps(){ sst=!sst; ast=-1; render(); }
function togStep(i){ ast=ast===i?-1:i; render(); }

function doReset(){
  _stopAll();
  ei=0;sr=1;sd=0;dt=0;rt=0;eon=false;edn=false;sst=false;ast=-1;ds=0;scr="home";
  render();
}

// ── INIT ──
render();
</script>
